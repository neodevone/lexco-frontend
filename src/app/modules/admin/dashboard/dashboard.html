<div class="min-h-screen bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center gap-3">
      <span class="text-2xl font-bold">Lexco</span>
      <span class="text-blue-300 text-sm">Panel Administrador</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-sm">{{ currentUser()?.name }}</span>
      <button
        (click)="logout()"
        class="bg-red-600 hover:bg-red-700 text-white text-sm px-4 py-2 rounded-lg transition"
      >
        Cerrar sesión
      </button>
    </div>
  </nav>

  <app-welcome-card 
    [userName]="currentUser()?.name || ''"
    [userRole]="currentUser()?.role || ''">
  </app-welcome-card>

  <!-- Contenido -->
  <div class="max-w-6xl mx-auto p-8">

    <h2 class="text-2xl font-bold text-gray-800 mb-8">¿Qué deseas gestionar?</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Usuarios -->
      <div
        (click)="navigateTo('users')"
        class="bg-white rounded-2xl shadow-md p-6 cursor-pointer hover:shadow-xl hover:scale-105 transition-all duration-200 border-l-4 border-blue-600"
      >
        <div class="text-4xl mb-4">👥</div>
        <h3 class="text-xl font-semibold text-gray-800">Usuarios</h3>
        <p class="text-gray-500 text-sm mt-1">Crear, editar y eliminar usuarios del sistema</p>
      </div>

      <!-- Productos -->
      <div
        (click)="navigateTo('products')"
        class="bg-white rounded-2xl shadow-md p-6 cursor-pointer hover:shadow-xl hover:scale-105 transition-all duration-200 border-l-4 border-green-600"
      >
        <div class="text-4xl mb-4">📦</div>
        <h3 class="text-xl font-semibold text-gray-800">Productos</h3>
        <p class="text-gray-500 text-sm mt-1">Gestión completa del inventario de productos</p>
      </div>

      <!-- Perfil -->
      <div
        (click)="navigateTo('profile')"
        class="bg-white rounded-2xl shadow-md p-6 cursor-pointer hover:shadow-xl hover:scale-105 transition-all duration-200 border-l-4 border-purple-600"
      >
        <div class="text-4xl mb-4">👤</div>
        <h3 class="text-xl font-semibold text-gray-800">Mi Perfil</h3>
        <p class="text-gray-500 text-sm mt-1">Ver y editar tus datos de administrador</p>
      </div>

    </div>

    <!-- Links directos -->
    <div class="mt-8 flex gap-4">
      <a routerLink="/admin/users" class="text-blue-700 hover:underline text-sm">→ Ir a Usuarios</a>
      <a routerLink="/admin/products" class="text-green-700 hover:underline text-sm">→ Ir a Productos</a>
      <a routerLink="/admin/profile" class="text-purple-700 hover:underline text-sm">→ Ir a Perfil</a>
    </div>

  </div>
</div>
