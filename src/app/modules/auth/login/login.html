<div class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-blue-900">Lexco</h1>
      <p class="text-gray-500 mt-1">Sistema de Gestión</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      @if (errorMessage) {
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
          {{ errorMessage }}
        </div>
      }

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="correo@ejemplo.com"
        />
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <p class="text-red-500 text-xs mt-1">Email inválido</p>
        }
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || loading"
        class="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-blue-300 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
      >
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="text-blue-700 font-medium hover:underline">Regístrate</a>
    </p>

  </div>
</div>
